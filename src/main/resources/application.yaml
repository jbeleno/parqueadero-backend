spring:
  application:
    name: parqueaderos-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parqueaderos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  security:
    # Spring Security auto-config deshabilitado para rutas públicas via SecurityConfig
    user:
      name: ${SECURITY_USER:admin}
      password: ${SECURITY_PASSWORD:admin}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

# Auth config
app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXP:3600000}      # 1 hora
    refresh-expiration-ms: ${JWT_REFRESH_EXP:604800000}  # 7 días
  pin:
    expiration-minutes: ${PIN_EXPIRATION:15}
  images:
    dir: ${APP_IMAGES_DIR:/app/images}
  ocr:
    enabled: ${OCR_ENABLED:true}
    url: ${OCR_URL:http://ocr:8001}
    timeout-ms: ${OCR_TIMEOUT_MS:10000}
  security:
    max-intentos-fallidos: 5
    bloqueo-minutos: 30

# Springdoc OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
