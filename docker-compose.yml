# Docker Compose para desarrollo local
# Para produccion el deploy se hace via Dokploy, no este archivo
#
# Uso:
#   1. cp .env.example .env
#   2. Editar .env con tus valores
#   3. docker compose up -d --build

services:

  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: parqueaderos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: parqueaderos
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d parqueaderos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parqueaderos-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/parqueaderos
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXP: ${JWT_ACCESS_EXP:-3600000}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP:-604800000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-onboarding@resend.dev}
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  pgdata:
    driver: local
